name: main

on:
  schedule:
    - cron: "10 23 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # 已支持 Node.js 24
      - name: Set up Python
        uses: actions/setup-python@v5  # 升级到 v5，兼容 Node.js 24
        with:
          python-version: "3.10"
      - run: pip install requests
      - run: python news.py
